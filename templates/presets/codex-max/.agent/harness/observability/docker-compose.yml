services:
  telemetry-fixture:
    image: python:3.12-alpine
    container_name: codex-observability-telemetry-fixture
    working_dir: /workspace
    command:
      - python3
      - /workspace/fixture/emit-local-telemetry.py
      - --runtime-dir
      - /workspace/runtime/logs
      - --trace-endpoint
      - http://victoria-traces:10428/insert/opentelemetry/v1/traces
    volumes:
      - ./fixture:/workspace/fixture:ro
      - ./runtime:/workspace/runtime
    ports:
      - "9471:9471"
    depends_on:
      - victoria-traces
    profiles:
      - smoke

  vector:
    image: timberio/vector:latest-alpine
    container_name: codex-observability-vector
    restart: unless-stopped
    volumes:
      - ./vector/vector.yaml:/etc/vector/vector.yaml:ro
      - ./runtime:/workspace/runtime
      - vector-data:/tmp/vector
    ports:
      - "8686:8686"
      - "4318:4318"
    depends_on:
      - victoria-logs
      - victoria-metrics
      - victoria-traces

  victoria-logs:
    image: victoriametrics/victoria-logs:v1.45.0
    container_name: codex-observability-victoria-logs
    restart: unless-stopped
    command:
      - -storageDataPath=/victoria-logs-data
    volumes:
      - victoria-logs-data:/victoria-logs-data
    ports:
      - "9428:9428"

  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.135.0
    container_name: codex-observability-victoria-metrics
    restart: unless-stopped
    command:
      - -storageDataPath=/victoria-metrics-data
      - -selfScrapeInterval=5s
    volumes:
      - victoria-metrics-data:/victoria-metrics-data
    ports:
      - "8428:8428"

  victoria-traces:
    image: victoriametrics/victoria-traces:latest
    container_name: codex-observability-victoria-traces
    restart: unless-stopped
    command:
      - -storageDataPath=/victoria-traces-data
    volumes:
      - victoria-traces-data:/victoria-traces-data
    ports:
      - "10428:10428"

volumes:
  vector-data:
  victoria-logs-data:
  victoria-metrics-data:
  victoria-traces-data:

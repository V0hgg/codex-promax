data_dir: /tmp/vector

api:
  enabled: true
  address: 0.0.0.0:8686

sources:
  app_logs:
    type: file
    include:
      - /workspace/runtime/logs/**/*.log
    read_from: beginning
  local_service_metrics:
    type: prometheus_scrape
    endpoints:
      - http://telemetry-fixture:9471/metrics
      - http://telemetry-fixture:9472/metrics
      - http://telemetry-fixture:9473/metrics
    scrape_interval_secs: 2

sinks:
  victoria_logs:
    type: http
    inputs:
      - app_logs
    uri: http://victoria-logs:9428/insert/jsonline?_msg_field=message
    method: post
    encoding:
      codec: json
    framing:
      method: newline_delimited

  victoria_metrics:
    type: prometheus_remote_write
    inputs:
      - local_service_metrics
    endpoint: http://victoria-metrics:8428/api/v1/write
